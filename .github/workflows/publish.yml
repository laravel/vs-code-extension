name: Publish VS Code Extension with Changelog Update

on:
    release:
        types: [created]

permissions:
  contents: read

jobs:
    update_changelog:
        if: ${{ !github.event.release.prerelease }}
        uses: laravel/.github/.github/workflows/update-changelog.yml@9c15e86fffce728fb6c50ebeae24fd63e98f4d1d # main
        permissions:
            contents: write

    publish:
        runs-on: ubuntu-latest
        needs: update_changelog
        if: ${{ !github.event.release.prerelease }}
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm install

            - name: Publish Extension
              env:
                  VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
              run: npx vsce publish -p $VSCE_TOKEN --no-git-tag-version

    publish_prerelease:
        runs-on: ubuntu-latest
        if: ${{ github.event.release.prerelease }}
        steps:
            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm install

            - name: Publish Pre-Release Extension
              env:
                  VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
              run: npx vsce publish --pre-release -p $VSCE_TOKEN --no-git-tag-version
